*{box-sizing:border-box;margin:0;padding:0}
body{background:#030712;color:#e5e7eb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

.cb{width:16px;height:16px;accent-color:#22c55e;cursor:pointer;flex-shrink:0;margin-top:2px}

.sev-crit{background:rgba(220,38,38,.12);color:#fca5a5;border-color:#7f1d1d}
.sev-high{background:rgba(234,88,12,.12);color:#fdba74;border-color:#7c2d12}
.sev-med{background:rgba(202,138,4,.12);color:#fde047;border-color:#713f12}
.sev-low{background:rgba(59,130,246,.12);color:#93c5fd;border-color:#1e3a5f}
.sev-recon{background:rgba(139,92,246,.12);color:#c4b5fd;border-color:#4c1d95}
.sev-all{background:#1f2937;color:#d1d5db;border-color:#374151}

.test-row{display:flex;align-items:flex-start;gap:10px;padding:7px 14px;cursor:pointer;border-radius:4px}

.progress-bar{height:6px;background:#1f2937;border-radius:3px;overflow:hidden;flex-shrink:0}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.search-input{background:#111827;border:1px solid #1f2937;border-radius:6px;padding:5px 10px;color:#d1d5db;font-size:12px;outline:none;width:180px;font-family:monospace}
.search-input:focus{border-color:#374151}
.section-title{font-size:11px;font-weight:700;color:#6b7280;letter-spacing:1.5px;text-transform:uppercase;padding:16px 0 8px 4px}
.arrow{font-size:11px;color:#4b5563;display:inline-block;transition:transform .2s;flex-shrink:0}
.arrow.open{transform:rotate(90deg)}
.toolbar{position:sticky;top:0;z-index:50;background:rgba(3,7,18,.95);backdrop-filter:blur(12px);border-bottom:1px solid #1f2937;padding:10px 16px}
.tb-btn{padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid #1f2937;background:#111827;color:#6b7280;font-family:inherit}
.tb-btn:hover{background:#1f2937;color:#d1d5db}
.done-tick{color:#22c55e;font-size:13px;flex-shrink:0}
@media(max-width:640px){.hide-sm{display:none}}

</div>

  DATA.forEach(section=>{
    const vulns=section.vulns.filter(v=>{
      if(currentFilter!=='all'&&v.s!==currentFilter)return false;
      if(q){
        const match=v.n.toLowerCase().includes(qLow)||v.t.some(t=>t.toLowerCase().includes(qLow));
        if(!match)return false;
      }
      if(hideDone){
        const allDone=v.t.every((_,i)=>checked[v.n+'::'+i]);
        if(allDone)return false;
      }
      return true;
    });
    if(!vulns.length)return;

    const secEl=document.createElement('div');
    const titleEl=document.createElement('div');
    titleEl.className='section-title';
    titleEl.textContent=section.title;
    secEl.appendChild(titleEl);

    vulns.forEach(v=>{
      const done=v.t.filter((_,i)=>checked[v.n+'::'+i]).length;
      const total=v.t.length;
      const allDone=done===total;
      const bar=SEV_BAR[v.s]||'#8b5cf6';
      const cls=SEV_CLS[v.s]||'sev-recon';

      const card=document.createElement('div');
      card.className='vuln-card'+(allDone?' all-done':'');
      card.id='card-'+v.n;

      // Header
      const head=document.createElement('div');
      head.className='vuln-head';
      head.onclick=()=>toggleCard(v.n);

      const arrow=document.createElement('span');
      arrow.className='arrow'+(openCards[v.n]?' open':'');
      arrow.textContent='▶';

      const tick=document.createElement('span');
      tick.className='done-tick';
      tick.textContent='✓';
      tick.style.display=allDone?'':'none';

      const title=document.createElement('span');
      title.style.cssText='flex:1;font-size:13px;font-weight:500';
      title.style.color=allDone?'#4ade80':bar;
      title.textContent=v.n;

      const sevPill=document.createElement('span');
      sevPill.className='pill '+cls;
      sevPill.style.cursor='default';
      sevPill.style.fontSize='10px';
      sevPill.textContent=v.s;

      const cvss=document.createElement('span');
      cvss.className='hide-sm';
      cvss.style.cssText='font-size:11px;font-family:monospace;color:#4b5563';
      cvss.textContent=v.c||'';

      const count=document.createElement('span');
      count.style.cssText='font-size:11px;font-family:monospace;color:#4b5563;min-width:40px;text-align:right';
      count.textContent=done+'/'+total;

      const pb=document.createElement('div');
      pb.className='progress-bar';
      pb.style.width='50px';
      const pf=document.createElement('div');
      pf.className='progress-fill';
      pf.style.width=(total?done/total*100:0)+'%';
      pf.style.background=allDone?'#22c55e':bar;
      pb.appendChild(pf);

      head.appendChild(arrow);
      head.appendChild(tick);
      head.appendChild(title);
      head.appendChild(sevPill);
      if(v.c&&v.c!=='—')head.appendChild(cvss);
      head.appendChild(count);
      head.appendChild(pb);
      card.appendChild(head);

      // Body (tests)
      const body=document.createElement('div');
      body.style.cssText='padding:2px 0 8px';
      body.style.display=openCards[v.n]?'block':'none';

      if(v.ch){
        const chain=document.createElement('div');
        chain.className='chain-box';
        const bold=document.createElement('b');
        bold.style.color='#f87171';
        bold.textContent='ESCALATION: ';
        chain.appendChild(bold);
        chain.appendChild(document.createTextNode(v.ch));
        body.appendChild(chain);
      }

      v.t.forEach((test,ti)=>{
        const k=v.n+'::'+ti;
        const isDone=!!checked[k];
        const row=document.createElement('label');
        row.className='test-row'+(isDone?' checked':'');

        const cb=document.createElement('input');
        cb.type='checkbox';
        cb.className='cb';
        cb.checked=isDone;
        cb.onchange=()=>toggleCheck(v.n,ti);

        const span=document.createElement('span');
        span.className='test-text';
        span.style.cssText='font-size:12px;font-family:monospace;line-height:1.6;color:'+(isDone?'#4b5563':'#9ca3af');
        // KEY FIX: use textContent, not innerHTML — payloads never execute
        span.textContent=test;

        row.appendChild(cb);
        row.appendChild(span);
        body.appendChild(row);
      });

      card.appendChild(body);
      secEl.appendChild(card);
    });

    content.appendChild(secEl);
  });
}

function toggleCard(name){
  openCards[name]=!openCards[name];
  renderContent();
}

function toggleCheck(name,idx){
  const k=name+'::'+idx;
  if(checked[k])delete checked[k];
  else checked[k]=true;
  saveChecked();
  renderContent();
  updateStats();
}

function updateStats(){
  const allVulns=DATA.flatMap(s=>s.vulns);
  let totalTests=0,doneTests=0;
  const sevStat={};
  allVulns.forEach(v=>{
    totalTests+=v.t.length;
    if(!sevStat[v.s])sevStat[v.s]={t:0,d:0};
    sevStat[v.s].t+=v.t.length;
    v.t.forEach((_,i)=>{
      if(checked[v.n+'::'+i]){doneTests++;sevStat[v.s].d++;}
    });
  });
  const pct=totalTests?Math.round(doneTests/totalTests*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=doneTests+'/'+totalTests+' ('+pct+'%)';
  document.getElementById('meta').textContent=allVulns.length+' vulns · '+totalTests+' tests';
  ['Critical','High','Medium','Low','Recon'].forEach(s=>{
    const st=sevStat[s]||{t:0,d:0};
    const el=document.getElementById('stat-'+s);
    if(el)el.textContent=st.d+'/'+st.t;
  });
}

function setFilter(f){
  currentFilter=f;
  ['all','Critical','High','Medium','Low','Recon'].forEach(s=>{
    const id=s==='all'?'pill-all':'pill-'+s;
    const el=document.getElementById(id);
    if(el)el.style.boxShadow=currentFilter===s?'0 0 8px rgba(255,255,255,.15)':'none';
  });
  renderContent();
}

function applyFilters(){renderContent();}

function expandAll(){
  DATA.flatMap(s=>s.vulns).forEach(v=>openCards[v.n]=true);
  renderContent();
}
function collapseAll(){
  openCards={};
  renderContent();
}
function resetAll(){
  if(!confirm('Reset all progress?'))return;
  checked={};
  saveChecked();
  renderContent();
  updateStats();
}

buildAll();
</script>
</body>
</html>
