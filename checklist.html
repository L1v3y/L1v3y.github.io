<style>
body{background:#030712;color:#e5e7eb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin:0}
*{box-sizing:border-box}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#111827}::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}
.cb{width:16px;height:16px;accent-color:#22c55e;cursor:pointer;flex-shrink:0;margin-top:2px}
.sev-crit{background:rgba(220,38,38,.12);color:#fca5a5;border-color:#7f1d1d}
.sev-high{background:rgba(234,88,12,.12);color:#fdba74;border-color:#7c2d12}
.sev-med{background:rgba(202,138,4,.12);color:#fde047;border-color:#713f12}
.sev-low{background:rgba(59,130,246,.12);color:#93c5fd;border-color:#1e3a5f}
.sev-recon{background:rgba(139,92,246,.12);color:#c4b5fd;border-color:#4c1d95}
.pill{padding:2px 10px;border-radius:9999px;font-size:11px;border:1px solid;cursor:pointer;font-weight:600;transition:all .2s}
.pill:hover{opacity:.8}
.pill.active{box-shadow:0 0 8px rgba(255,255,255,.1)}
.vuln-card{border:1px solid #1f2937;border-radius:8px;margin-bottom:6px;transition:all .2s;overflow:hidden}
.vuln-card.done{border-color:rgba(34,197,94,.2);background:rgba(34,197,94,.03)}
.vuln-head{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .15s}
.vuln-head:hover{background:rgba(255,255,255,.02)}
.test-row{display:flex;align-items:flex-start;gap:10px;padding:7px 14px;cursor:pointer;border-radius:4px;transition:background .1s}
.test-row:hover{background:rgba(255,255,255,.03)}
.test-row.checked{opacity:.5}
.test-row.checked .test-text{text-decoration:line-through}
.chain-box{margin:6px 14px 10px;padding:8px 12px;border-left:3px solid #ef4444;background:rgba(239,68,68,.05);border-radius:0 6px 6px 0;font-size:12px;color:#fca5a5}
.progress-bar{height:6px;background:#1f2937;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.search-input{background:#111827;border:1px solid #1f2937;border-radius:6px;padding:5px 10px;color:#d1d5db;font-size:12px;outline:none;width:180px;font-family:monospace}
.search-input:focus{border-color:#374151}
.section-title{font-size:11px;font-weight:700;color:#6b7280;letter-spacing:1.5px;text-transform:uppercase;padding:16px 0 8px 4px}
.arrow{font-size:11px;color:#4b5563;transition:transform .2s;flex-shrink:0}
.arrow.open{transform:rotate(90deg)}
.toolbar{position:sticky;top:0;z-index:50;background:rgba(3,7,18,.92);backdrop-filter:blur(12px);border-bottom:1px solid #1f2937;padding:10px 16px}
.tb-btn{padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid #1f2937;background:#111827;color:#6b7280;transition:all .2s;font-family:inherit}
.tb-btn:hover{background:#1f2937;color:#d1d5db}
@media(max-width:640px){.hide-mobile{display:none}.search-input{width:120px}}
</style>
</head>

      // Filters
      React.createElement("div",{style:{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}},
        React.createElement("span",{className:"pill "+(filter==="all"?"active":""),style:{background:filter==="all"?"#374151":"#111827",borderColor:filter==="all"?"#6b7280":"#1f2937",color:filter==="all"?"#fff":"#6b7280"},onClick:()=>setFilter("all")},"All"),
        ...["Critical","High","Medium","Low","Recon"].map(s=>{
          const st=sevStats[s]||{t:0,d:0};
          return React.createElement("span",{key:s,className:"pill "+SEV[s].cls+(filter===s?" active":""),onClick:()=>setFilter(filter===s?"all":s)},s+" "+st.d+"/"+st.t);
        }),
        React.createElement("div",{style:{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}},
          React.createElement("label",{style:{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"#6b7280",cursor:"pointer"}},
            React.createElement("input",{type:"checkbox",checked:hideDone,onChange:e=>setHideDone(e.target.checked)}),
            React.createElement("span",{className:"hide-mobile"},"Hide done"),
          ),
          React.createElement("input",{className:"search-input",placeholder:"Search...",value:search,onChange:e=>setSearch(e.target.value)}),
        ),
      ),
    ),
    // Content
    React.createElement("div",{style:{maxWidth:960,margin:"0 auto",padding:"12px 16px"}},
      ...Object.entries(grouped).map(([sec,vulns])=>
        React.createElement("div",{key:sec},
          React.createElement("div",{className:"section-title"},sec),
          ...vulns.map(v=>{
            const isOpen=open[v.n];
            const vDone=v.t.filter((_,i)=>ck[v.n+"::"+i]).length;
            const vTotal=v.t.length;
            const allDone=vDone===vTotal;
            const cfg=SEV[v.s]||SEV.Recon;
            return React.createElement("div",{key:v.n,className:"vuln-card"+(allDone?" done":"")},
              React.createElement("div",{className:"vuln-head",onClick:()=>setOpen(p=>({...p,[v.n]:!p[v.n]}))},
                React.createElement("span",{className:"arrow"+(isOpen?" open":""),"▸"},"▶"),
                allDone&&React.createElement("span",{style:{color:"#22c55e",fontSize:13}},"✓"),
                React.createElement("span",{style:{flex:1,fontSize:13,fontWeight:500,color:allDone?"#4ade80":cfg.bar}},v.n),
                React.createElement("span",{className:"pill "+cfg.cls,style:{fontSize:10,cursor:"default"}},v.s),
                v.c&&v.c!=="—"&&React.createElement("span",{className:"hide-mobile",style:{fontSize:11,fontFamily:"monospace",color:"#4b5563"}},v.c),
                React.createElement("span",{style:{fontSize:11,fontFamily:"monospace",color:"#4b5563",minWidth:40,textAlign:"right"}},vDone+"/"+vTotal),
                React.createElement("div",{className:"progress-bar",style:{width:50}},
                  React.createElement("div",{className:"progress-fill",style:{width:(vTotal?vDone/vTotal*100:0)+"%",background:allDone?"#22c55e":cfg.bar}})
                ),
              ),
              isOpen&&React.createElement("div",{style:{padding:"2px 0 8px"}},
                v.ch&&React.createElement("div",{className:"chain-box"},React.createElement("b",{style:{color:"#f87171"}},"ESCALATION: "),v.ch),
                ...v.t.map((test,ti)=>{
                  const k=v.n+"::"+ti;
                  const done=ck[k];
                  return React.createElement("label",{key:ti,className:"test-row"+(done?" checked":"")},
                    React.createElement("input",{type:"checkbox",className:"cb",checked:!!done,onChange:()=>toggle(v.n,ti)}),
                    React.createElement("span",{className:"test-text",style:{fontSize:12,fontFamily:"monospace",color:done?"#4b5563":"#9ca3af",lineHeight:1.6}},test),
                  );
                }),
              ),
            );
          }),
        )
      ),
    ),
    React.createElement("div",{style:{textAlign:"center",padding:"40px 20px",fontSize:11,color:"#374151",borderTop:"1px solid #1f2937"}},"55 vulnerabilities · 464 test cases · Progress saved in browser"),
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
