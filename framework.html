<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bug Bounty Autopwn Framework</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #080c10;
  --surface: #0e1419;
  --surface2: #161d26;
  --border: #1e2a35;
  --border2: #243040;
  --text: #cdd9e5;
  --text-muted: #546578;
  --text-dim: #8899aa;
  --accent: #4d9de0;
  --green: #39d353;
  --red: #f05151;
  --purple: #a78bfa;
  --orange: #f0883e;
  --yellow: #e3b341;
  --glow-blue: rgba(77,157,224,0.15);
  --glow-green: rgba(57,211,83,0.12);
  --glow-red: rgba(240,81,81,0.15);
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  overflow: hidden;
  height: 100%;
  width: 100%;
  touch-action: pan-x pan-y;
}

/* Scanline effect */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* ── TOOLBAR ── */
#toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(8,12,16,0.96);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 12px; height: 52px; gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
}
#toolbar::-webkit-scrollbar { display: none; }

.logo {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700; font-size: 13px;
  color: var(--accent);
  white-space: nowrap; flex-shrink: 0;
  letter-spacing: -0.5px;
}
.logo em { color: var(--green); font-style: normal; }
.logo span { color: var(--text-muted); }

.tb-sep { width: 1px; height: 20px; background: var(--border); margin: 0 2px; flex-shrink: 0; }

.tb-btn {
  padding: 5px 12px; border-radius: 5px;
  font-size: 11px; font-family: 'JetBrains Mono', monospace;
  cursor: pointer; border: 1px solid var(--border);
  background: var(--surface); color: var(--text-muted);
  transition: all .2s; white-space: nowrap; flex-shrink: 0;
  letter-spacing: 0.3px;
}
.tb-btn:hover, .tb-btn:active {
  background: var(--surface2); color: var(--text); border-color: var(--accent);
  box-shadow: 0 0 12px var(--glow-blue);
}

#searchBox {
  padding: 5px 12px; border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--surface); color: var(--text);
  font-size: 11px; font-family: 'JetBrains Mono', monospace;
  width: 160px; min-width: 100px; outline: none; flex-shrink: 0;
  transition: border-color .2s;
}
#searchBox:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--glow-blue); }
#searchBox::placeholder { color: var(--text-muted); }

#nodeCount {
  margin-left: auto; font-size: 10px; color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace; white-space: nowrap; flex-shrink: 0;
}

/* ── CANVAS ── */
#treeContainer {
  position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
}
svg { width: 100%; height: 100%; }

.link {
  fill: none;
  stroke: var(--border2);
  stroke-width: 1.2;
}
.link.exploit { stroke: rgba(240,81,81,0.25); }
.link.tool { stroke: rgba(57,211,83,0.18); }
.link.phase { stroke: rgba(77,157,224,0.2); }

.node { cursor: pointer; }
.node circle {
  stroke-width: 1.5;
  transition: r .2s, filter .2s;
}
.node:hover circle {
  filter: drop-shadow(0 0 6px currentColor);
}
.node text {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  fill: var(--text);
  pointer-events: none;
  user-select: none;
}
.node .cmd-hint {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  fill: var(--green);
  opacity: 0.65;
  pointer-events: none;
}

/* ── TOOLTIP / DETAIL PANEL ── */
#detailPanel {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  max-width: 460px;
  min-width: 300px;
  z-index: 200;
  display: none;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(77,157,224,0.1);
  overflow: hidden;
}

/* Mobile: full-bottom-sheet */
@media (max-width: 640px) {
  #detailPanel {
    position: fixed !important;
    left: 0 !important; right: 0 !important;
    bottom: 0 !important; top: auto !important;
    max-width: 100% !important;
    min-width: unset !important;
    border-radius: 16px 16px 0 0;
    border-left: none; border-right: none; border-bottom: none;
    max-height: 70vh;
    overflow-y: auto;
  }
  #detailPanel .dp-cmd { max-height: 140px; }
}

.dp-drag {
  display: none;
  width: 40px; height: 4px;
  background: var(--border2); border-radius: 2px;
  margin: 10px auto 0;
}
@media (max-width: 640px) { .dp-drag { display: block; } }

.dp-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.dp-icon {
  width: 34px; height: 34px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
}
.dp-title { font-weight: 700; font-size: 14px; color: #e8f0f8; flex: 1; }
.dp-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; padding: 3px 8px; border-radius: 10px;
  font-weight: 600; letter-spacing: 0.5px; flex-shrink: 0;
}
.dp-close {
  background: none; border: none; color: var(--text-muted);
  font-size: 20px; cursor: pointer; line-height: 1;
  padding: 0 0 0 4px; flex-shrink: 0;
}
.dp-close:hover { color: var(--text); }

.dp-body { padding: 12px 16px; }
.dp-desc { font-size: 12px; color: var(--text-dim); line-height: 1.65; margin-bottom: 10px; }

.dp-cmd {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 10px 12px;
  margin: 8px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--green);
  line-height: 1.75;
  position: relative;
  max-height: 180px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.dp-cmd::-webkit-scrollbar { width: 4px; }
.dp-cmd::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.copy-btn {
  position: absolute; top: 6px; right: 6px;
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text-muted); font-size: 9px; padding: 3px 8px;
  border-radius: 4px; cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  transition: all .15s;
}
.copy-btn:hover { color: var(--text); background: var(--border); }
.copy-btn.copied { color: var(--green); border-color: var(--green); }

.dp-link {
  display: inline-flex; align-items: center; gap: 5px;
  color: var(--accent); font-size: 11px; text-decoration: none;
  padding: 6px 12px; border: 1px solid var(--border);
  border-radius: 6px; margin: 4px 4px 0 0;
  transition: all .2s; font-family: 'JetBrains Mono', monospace;
}
.dp-link:hover { background: var(--glow-blue); border-color: var(--accent); }

.dp-footer {
  padding: 8px 16px;
  border-top: 1px solid var(--border);
  font-size: 9px; color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
}

/* ── LEGEND ── */
#legend {
  position: fixed; bottom: 10px; left: 10px; z-index: 50;
  background: rgba(8,12,16,0.92); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px;
  font-size: 10px; display: flex; gap: 12px; flex-wrap: wrap;
  font-family: 'JetBrains Mono', monospace;
  backdrop-filter: blur(8px);
}
@media (max-width: 640px) {
  #legend { display: none; }
}
.leg { display: flex; align-items: center; gap: 5px; color: var(--text-muted); }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }

/* ── HINT ── */
#hint {
  position: fixed; bottom: 10px; right: 10px; z-index: 50;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--text-muted);
  background: rgba(8,12,16,0.88);
  padding: 6px 10px; border-radius: 6px;
  border: 1px solid var(--border);
}
@media (max-width: 640px) {
  #hint { font-size: 9px; bottom: 8px; right: 8px; }
}

/* ── MOBILE TOUCH INDICATOR ── */
#touchIndicator {
  display: none;
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  background: rgba(77,157,224,0.15); border: 1px solid var(--accent);
  border-radius: 20px; padding: 5px 14px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--accent); z-index: 99;
  animation: fadeOut 3s forwards;
}
@media (max-width: 640px) { #touchIndicator { display: block; } }
@keyframes fadeOut { 0%,70%{opacity:1} 100%{opacity:0;pointer-events:none} }

/* Scrollbars */
* { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
</style>
</head>
<body>

<div id="toolbar">
  <div class="logo">[<em>autopwn</em>]<span>.fw</span></div>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="expandAll()">⊕ All</button>
  <button class="tb-btn" onclick="collapseAll()">⊖ Col</button>
  <button class="tb-btn" onclick="resetZoom()">⌖ Reset</button>
  <div class="tb-sep"></div>
  <input type="text" id="searchBox" placeholder="Search…" oninput="searchTree(this.value)">
  <div id="nodeCount"></div>
</div>

<div id="treeContainer">
  <svg id="treeSvg"></svg>
</div>

<div id="detailPanel">
  <div class="dp-drag"></div>
</div>

<div id="legend">
  <div class="leg"><div class="leg-dot" style="background:var(--orange)"></div>Root</div>
  <div class="leg"><div class="leg-dot" style="background:var(--accent)"></div>Phase</div>
  <div class="leg"><div class="leg-dot" style="background:var(--purple)"></div>Category</div>
  <div class="leg"><div class="leg-dot" style="background:var(--green)"></div>Tool</div>
  <div class="leg"><div class="leg-dot" style="background:var(--red)"></div>Exploit</div>
  <span style="color:var(--text-muted);margin-left:6px">Tap/Click=expand · Long-press/Right-click=details</span>
</div>

<div id="hint" id="hint">
  <span class="desktop-hint">Scroll=zoom · Drag=pan · Click=expand · Right-click=details</span>
  <span class="mobile-hint" style="display:none">Pinch=zoom · Drag=pan · Tap=expand</span>
</div>

<div id="touchIndicator">Tap nodes to expand · Long-press for details</div>

<script>
// ═══════════════════════════════════════════════════════
// DETECT MOBILE
// ═══════════════════════════════════════════════════════
const isMobile = window.matchMedia('(max-width: 640px)').matches || 'ontouchstart' in window;
if (isMobile) {
  document.querySelector('.desktop-hint').style.display = 'none';
  document.querySelector('.mobile-hint').style.display = 'inline';
}

// ═══════════════════════════════════════════════════════
// DATA — MERGED FROM ORIGINAL + IMAGE ADDITIONS
// ═══════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════
// D3 TREE SETUP
// ═══════════════════════════════════════════════════════
const svg = d3.select("#treeSvg");
const container = svg.append("g").attr("id","treeGroup");
const W = window.innerWidth;
const H = window.innerHeight - 52;

// Zoom with touch support
const zoom = d3.zoom()
  .scaleExtent([0.08, 3])
  .on("zoom", e => container.attr("transform", e.transform));

svg.call(zoom);

const initScale = isMobile ? 0.45 : 0.8;
const initX = isMobile ? 100 : 160;
svg.call(zoom.transform, d3.zoomIdentity.translate(initX, H / 2).scale(initScale));

const treemap = d3.tree().nodeSize([isMobile ? 18 : 22, isMobile ? 220 : 270]);

let root = d3.hierarchy(DATA);
root.x0 = H / 2;
root.y0 = 0;

// Collapse to depth 0 initially
root.descendants().forEach(d => {
  if (d.children && d.depth >= 1) {
    d._children = d.children;
    d.children = null;
  }
});

let nodeId = 0;
const duration = isMobile ? 250 : 380;

// ═══════════════════════════════════════════════════════
// UPDATE FUNCTION
// ═══════════════════════════════════════════════════════
function update(source) {
  const treeData = treemap(root);
  const nodes = treeData.descendants();
  const links = treeData.links();

  nodes.forEach(d => { d.y = d.depth * (isMobile ? 200 : 255); });

  // Link class
  function linkClass(d) {
    const c = d.target.data._color;
    if (c === "#f05151") return "link exploit";
    if (c === "#39d353") return "link tool";
    if (c === "#4d9de0") return "link phase";
    return "link";
  }

  // LINKS
  const link = container.selectAll("path.link")
    .data(links, d => d.target.id);

  const linkEnter = link.enter().insert("path", "g")
    .attr("class", linkClass)
    .attr("d", () => {
      const o = {x: source.x0, y: source.y0};
      return diagonal(o, o);
    });

  linkEnter.merge(link).transition().duration(duration)
    .attr("class", linkClass)
    .attr("d", d => diagonal(d.source, d.target));

  link.exit().transition().duration(duration)
    .attr("d", () => {
      const o = {x: source.x, y: source.y};
      return diagonal(o, o);
    }).remove();

  // NODES
  const node = container.selectAll("g.node")
    .data(nodes, d => d.id || (d.id = ++nodeId));

  const nodeEnter = node.enter().append("g")
    .attr("class", "node")
    .attr("transform", () => `translate(${source.y0},${source.x0})`);

  // Desktop: click to expand, right-click for details
  // Mobile: tap to expand, long-press for details
  let pressTimer = null;

  nodeEnter
    .on("click", function(event, d) {
      event.stopPropagation();
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
      toggle(d);
      update(d);
    })
    .on("contextmenu", function(event, d) {
      event.preventDefault();
      showDetail(event, d);
    })
    .on("touchstart", function(event, d) {
      pressTimer = setTimeout(() => {
        pressTimer = null;
        showDetail(event, d, true);
      }, 500);
    })
    .on("touchend", function() {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    })
    .on("touchmove", function() {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    });

  nodeEnter.append("circle")
    .attr("r", 0)
    .style("fill", d => d._children ? (d.data._color || "#4d9de0") : (d.data._color ? d.data._color + "28" : "#1e2a35"))
    .style("stroke", d => d.data._color || "#4d9de0")
    .style("color", d => d.data._color || "#4d9de0");

  nodeEnter.append("text")
    .attr("dy", ".35em")
    .attr("x", d => (d.children || d._children) ? -13 : 13)
    .attr("text-anchor", d => (d.children || d._children) ? "end" : "start")
    .text(d => {
      const t = d.data.icon ? d.data.icon + " " + d.data.name : d.data.name;
      const maxLen = isMobile ? 30 : 40;
      return t.length > maxLen ? t.substring(0, maxLen - 1) + "…" : t;
    })
    .style("fill", d => d.data._color === "#f05151" ? "#f05151" : d.data._color === "#39d353" ? "#cdd9e5" : "#cdd9e5")
    .style("font-size", d => d.depth === 0 ? (isMobile ? "13px" : "15px") : d.depth === 1 ? (isMobile ? "11px" : "13px") : (isMobile ? "10px" : "12px"))
    .style("font-weight", d => d.depth <= 1 ? "700" : "400");

  // CMD hint (desktop only)
  if (!isMobile) {
    nodeEnter.filter(d => d.data.cmd && !d.children && !d._children)
      .append("text")
      .attr("class", "cmd-hint")
      .attr("dy", "1.6em").attr("x", 13)
      .text(d => {
        const c = d.data.cmd.split("\n")[0];
        return c.length > 52 ? c.substring(0, 50) + "…" : c;
      });
  }

  const nodeUpdate = nodeEnter.merge(node);

  nodeUpdate.transition().duration(duration)
    .attr("transform", d => `translate(${d.y},${d.x})`);

  nodeUpdate.select("circle")
    .attr("r", d => d.depth === 0 ? (isMobile ? 8 : 10) : d._children ? (isMobile ? 5 : 7) : (isMobile ? 4 : 5))
    .style("fill", d => d._children ? (d.data._color || "#4d9de0") + "cc" : (d.data._color ? d.data._color + "20" : "#1e2a35"))
    .style("stroke", d => d.data._color || "#243040");

  node.exit().transition().duration(duration)
    .attr("transform", () => `translate(${source.y},${source.x})`)
    .remove();

  nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
  updateCount();
}

function diagonal(s, d) {
  return `M${s.y} ${s.x}C${(s.y+d.y)/2} ${s.x},${(s.y+d.y)/2} ${d.x},${d.y} ${d.x}`;
}

function toggle(d) {
  if (d.children) { d._children = d.children; d.children = null; }
  else { d.children = d._children; d._children = null; }
}

// ═══════════════════════════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════════════════════════
function showDetail(event, d, fromTouch = false) {
  const data = d.data;
  if (!data.cmd && !data.desc) return;

  const panel = document.getElementById("detailPanel");
  const color = data._color || "#4d9de0";
  const isExploit = data._color === "#f05151";
  const iconBg = color + "18";

  let cmdHtml = "";
  if (data.cmd) {
    cmdHtml = `<div class="dp-cmd"><button class="copy-btn" onclick="copyCmd(this)">COPY</button>${escHtml(data.cmd)}</div>`;
  }

  let linkHtml = "";
  if (data.url) {
    linkHtml = `<div style="margin-top:8px"><a class="dp-link" href="${data.url}" target="_blank" rel="noopener">🔗 Tool / Reference ↗</a></div>`;
  }

  panel.innerHTML = `
    <div class="dp-drag"></div>
    <div class="dp-header">
      <div class="dp-icon" style="background:${iconBg};color:${color}">${data.icon || (isExploit ? "⚡" : "🔧")}</div>
      <div class="dp-title">${data.name}</div>
      <span class="dp-badge" style="background:${isExploit ? "#f0515118" : "#39d35318"};color:${isExploit ? "#f05151" : "#39d353"}">${isExploit ? "EXPLOIT" : "TOOL"}</span>
      <button class="dp-close" onclick="document.getElementById('detailPanel').style.display='none'">×</button>
    </div>
    <div class="dp-body">
      ${data.desc ? `<div class="dp-desc">${data.desc}</div>` : ""}
      ${cmdHtml}
      ${linkHtml}
    </div>
    <div class="dp-footer">Tap/Right-click any tool node for details</div>
  `;

  panel.style.display = "block";

  if (!isMobile) {
    let x = event.clientX + 16;
    let y = event.clientY - 20;
    if (x + 460 > window.innerWidth) x = event.clientX - 470;
    if (y + 420 > window.innerHeight) y = window.innerHeight - 430;
    if (y < 60) y = 60;
    panel.style.left = x + "px";
    panel.style.top = y + "px";
  }
}

function copyCmd(btn) {
  const block = btn.parentElement;
  const text = block.innerText.replace("COPY\n","").replace("COPIED\n","").trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "COPIED";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "COPY"; btn.classList.remove("copied"); }, 2000);
  });
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

document.addEventListener("click", e => {
  if (!e.target.closest("#detailPanel")) {
    document.getElementById("detailPanel").style.display = "none";
  }
});

// ═══════════════════════════════════════════════════════
// TOOLBAR
// ═══════════════════════════════════════════════════════
function expandAllRecursive(d) {
  if (d._children) { d.children = d._children; d._children = null; }
  if (d.children) d.children.forEach(expandAllRecursive);
}
function collapseAllRecursive(d) {
  if (d.children) {
    d.children.forEach(collapseAllRecursive);
    if (d.depth >= 1) { d._children = d.children; d.children = null; }
  }
}
function expandAll() {
  expandAllRecursive(root); update(root);
  const s = isMobile ? 0.25 : 0.32;
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity.translate(60, H/2).scale(s));
}
function collapseAll() {
  root.children.forEach(c => collapseAllRecursive(c)); update(root);
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity.translate(initX, H/2).scale(initScale));
}
function resetZoom() {
  svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity.translate(initX, H/2).scale(initScale));
}
function updateCount() {
  const vis = root.descendants().length;
  document.getElementById("nodeCount").textContent = `${vis} nodes`;
}
function searchTree(query) {
  if (!query) { update(root); return; }
  query = query.toLowerCase();
  function expand(d) {
    let found = d.data.name.toLowerCase().includes(query) ||
                (d.data.cmd || "").toLowerCase().includes(query) ||
                (d.data.desc || "").toLowerCase().includes(query);
    const ch = d.children || d._children;
    if (ch) {
      ch.forEach(c => { if (expand(c)) found = true; });
      if (found) { d.children = ch; d._children = null; }
    }
    return found;
  }
  expand(root); update(root);
}

// ═══════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════
document.addEventListener("keydown", e => {
  if (e.key === "Escape") document.getElementById("detailPanel").style.display = "none";
  if (e.key === "/" && !e.target.matches("input")) { e.preventDefault(); document.getElementById("searchBox").focus(); }
});

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
update(root);
</script>
