<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bug Bounty Autopwn Framework</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0d1117;
  color: #c9d1d9;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

#toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(13,17,23,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid #21262d;
  display: flex; align-items: center;
  padding: 0 16px; height: 48px; gap: 8px;
}

#toolbar .logo {
  font-family: 'Source Code Pro', monospace;
  font-weight: 700; font-size: 14px;
  color: #58a6ff; margin-right: 12px;
  white-space: nowrap;
}

#toolbar .logo span { color: #3fb950; }

.tb-btn {
  padding: 5px 14px; border-radius: 6px;
  font-size: 12px; font-family: 'Source Code Pro', monospace;
  cursor: pointer; border: 1px solid #30363d;
  background: #161b22; color: #8b949e;
  transition: all .2s; white-space: nowrap;
}
.tb-btn:hover { background: #21262d; color: #c9d1d9; border-color: #58a6ff; }
.tb-btn.active { background: #1f6feb20; color: #58a6ff; border-color: #58a6ff; }

.tb-sep { width: 1px; height: 24px; background: #21262d; margin: 0 4px; }

#searchBox {
  padding: 5px 12px; border-radius: 6px; border: 1px solid #30363d;
  background: #0d1117; color: #c9d1d9; font-size: 12px;
  font-family: 'Source Code Pro', monospace;
  width: 200px; outline: none;
}
#searchBox:focus { border-color: #58a6ff; }
#searchBox::placeholder { color: #484f58; }

#nodeCount {
  margin-left: auto; font-size: 11px; color: #484f58;
  font-family: 'Source Code Pro', monospace; white-space: nowrap;
}

/* CANVAS */
#treeContainer {
  position: fixed; top: 48px; left: 0; right: 0; bottom: 0;
}

svg { width: 100%; height: 100%; }

.link {
  fill: none;
  stroke: #21262d;
  stroke-width: 1.2;
  transition: stroke .3s;
}

.link.highlighted { stroke: #3fb950; stroke-width: 2; }

.node { cursor: pointer; }

.node circle {
  stroke-width: 2;
  transition: all .2s;
}

.node:hover circle {
  filter: drop-shadow(0 0 8px currentColor);
}

.node text {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  fill: #c9d1d9;
  pointer-events: none;
}

.node .cmd-text {
  font-family: 'Source Code Pro', monospace;
  font-size: 10px;
  fill: #3fb950;
  opacity: 0.8;
}

/* TOOLTIP */
#tooltip {
  position: fixed;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 0;
  max-width: 480px;
  min-width: 320px;
  z-index: 200;
  display: none;
  box-shadow: 0 16px 48px rgba(0,0,0,0.6);
  overflow: hidden;
}

.tt-header {
  padding: 12px 16px;
  border-bottom: 1px solid #21262d;
  display: flex; align-items: center; gap: 10px;
}

.tt-icon {
  width: 32px; height: 32px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}

.tt-title { font-weight: 600; font-size: 14px; color: #e6edf3; }
.tt-sev {
  font-family: 'Source Code Pro', monospace;
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  margin-left: auto; font-weight: 600;
}

.tt-body { padding: 12px 16px; }

.tt-desc { font-size: 12px; color: #8b949e; line-height: 1.6; margin-bottom: 10px; }

.tt-cmd-block {
  background: #0d1117;
  border: 1px solid #21262d;
  border-radius: 6px;
  padding: 10px 12px;
  margin: 8px 0;
  font-family: 'Source Code Pro', monospace;
  font-size: 11px;
  color: #3fb950;
  line-height: 1.7;
  position: relative;
  max-height: 200px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
}

.tt-cmd-block .copy-btn {
  position: absolute; top: 6px; right: 6px;
  background: #21262d; border: 1px solid #30363d;
  color: #8b949e; font-size: 10px; padding: 2px 8px;
  border-radius: 4px; cursor: pointer;
  font-family: 'Source Code Pro', monospace;
}
.tt-cmd-block .copy-btn:hover { color: #e6edf3; background: #30363d; }

.tt-link {
  display: inline-flex; align-items: center; gap: 6px;
  color: #58a6ff; font-size: 12px; text-decoration: none;
  padding: 6px 12px; border: 1px solid #21262d;
  border-radius: 6px; margin: 4px 4px 4px 0;
  transition: all .2s;
}
.tt-link:hover { background: #1f6feb20; border-color: #58a6ff; }

.tt-links { display: flex; flex-wrap: wrap; margin-top: 8px; }

.tt-footer {
  padding: 8px 16px;
  border-top: 1px solid #21262d;
  font-size: 10px;
  color: #484f58;
  font-family: 'Source Code Pro', monospace;
}

.tt-close {
  position: absolute; top: 10px; right: 12px;
  background: none; border: none; color: #484f58;
  font-size: 18px; cursor: pointer; line-height: 1;
}
.tt-close:hover { color: #c9d1d9; }

/* Legend */
#legend {
  position: fixed; bottom: 12px; left: 12px; z-index: 50;
  background: rgba(13,17,23,0.9); border: 1px solid #21262d;
  border-radius: 8px; padding: 12px 16px;
  font-size: 11px; display: flex; gap: 14px; flex-wrap: wrap;
}

.leg-item { display: flex; align-items: center; gap: 6px; }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; }

/* Minimap hint */
#hint {
  position: fixed; bottom: 12px; right: 12px; z-index: 50;
  font-family: 'Source Code Pro', monospace;
  font-size: 10px; color: #484f58;
}
</style>
</head>
<body>

<div id="hint">Scroll to zoom · Drag to pan · Click nodes to expand</div>

// D3 COLLAPSIBLE TREE
// ════════════════════════════════════════════════════════

const svg = d3.select("#treeSvg");
const container = svg.append("g").attr("id","treeGroup");

const width = window.innerWidth;
const height = window.innerHeight - 48;

// Zoom
const zoom = d3.zoom()
  .scaleExtent([0.1, 3])
  .on("zoom", e => container.attr("transform", e.transform));

svg.call(zoom);

// Initial transform
svg.call(zoom.transform, d3.zoomIdentity.translate(140, height / 2).scale(0.85));

const treemap = d3.tree().nodeSize([22, 280]);

let root = d3.hierarchy(DATA);
root.x0 = height / 2;
root.y0 = 0;

// Collapse all except first 2 levels
function collapseAfterDepth(d, depth) {
  if (d.children && d.depth >= depth) {
    d._children = d.children;
    d._children.forEach(c => collapseAfterDepth(c, depth));
    d.children = null;
  } else if (d.children) {
    d.children.forEach(c => collapseAfterDepth(c, depth));
  }
}

root.descendants().forEach(d => {
  if (d.children && d.depth >= 1) {
    d._children = d.children;
    d.children = null;
  }
});

let i = 0;
const duration = 400;

function update(source) {
  const treeData = treemap(root);
  const nodes = treeData.descendants();
  const links = treeData.links();

  nodes.forEach(d => { d.y = d.depth * 260; });

  // NODES
  const node = container.selectAll("g.node")
    .data(nodes, d => d.id || (d.id = ++i));

  const nodeEnter = node.enter().append("g")
    .attr("class", "node")
    .attr("transform", d => `translate(${source.y0},${source.x0})`)
    .on("click", (event, d) => { toggle(d); update(d); })
    .on("contextmenu", (event, d) => { event.preventDefault(); showTooltip(event, d); });

  nodeEnter.append("circle")
    .attr("r", 0)
    .style("fill", d => d._children ? (d.data._color || "#58a6ff") : (d.data._color ? d.data._color + "40" : "#21262d"))
    .style("stroke", d => d.data._color || "#58a6ff");

  nodeEnter.append("text")
    .attr("dy", ".35em")
    .attr("x", d => d.children || d._children ? -14 : 14)
    .attr("text-anchor", d => d.children || d._children ? "end" : "start")
    .text(d => {
      let t = d.data.icon ? d.data.icon + " " + d.data.name : d.data.name;
      return t.length > 38 ? t.substring(0,36) + "…" : t;
    })
    .style("fill", d => d.data._color === "#f85149" ? "#f85149" : "#c9d1d9")
    .style("font-size", d => d.depth === 0 ? "15px" : d.depth === 1 ? "13px" : "12px")
    .style("font-weight", d => d.depth <= 1 ? "600" : "400");

  // Command hint text
  nodeEnter.filter(d => d.data.cmd && !d.children && !d._children)
    .append("text")
    .attr("class", "cmd-text")
    .attr("dy", "1.6em")
    .attr("x", 14)
    .text(d => {
      const c = d.data.cmd.split("\n")[0];
      return c.length > 50 ? c.substring(0, 48) + "…" : c;
    });

  // UPDATE
  const nodeUpdate = nodeEnter.merge(node);

  nodeUpdate.transition().duration(duration)
    .attr("transform", d => `translate(${d.y},${d.x})`);

  nodeUpdate.select("circle")
    .attr("r", d => d.depth === 0 ? 10 : d._children ? 7 : 5)
    .style("fill", d => d._children ? (d.data._color || "#58a6ff") : (d.data._color ? d.data._color + "30" : "#21262d"))
    .style("stroke", d => d.data._color || "#30363d");

  // EXIT
  const nodeExit = node.exit().transition().duration(duration)
    .attr("transform", d => `translate(${source.y},${source.x})`)
    .remove();

  nodeExit.select("circle").attr("r", 0);
  nodeExit.select("text").style("fill-opacity", 0);

  // LINKS
  const link = container.selectAll("path.link")
    .data(links, d => d.target.id);

  const linkEnter = link.enter().insert("path", "g")
    .attr("class", "link")
    .attr("d", d => {
      const o = {x: source.x0, y: source.y0};
      return diagonal(o, o);
    });

  const linkUpdate = linkEnter.merge(link);
  linkUpdate.transition().duration(duration)
    .attr("d", d => diagonal(d.source, d.target));

  link.exit().transition().duration(duration)
    .attr("d", d => {
      const o = {x: source.x, y: source.y};
      return diagonal(o, o);
    }).remove();

  // Store old positions
  nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });

  updateCount();
}

function diagonal(s, d) {
  return `M ${s.y} ${s.x} C ${(s.y + d.y) / 2} ${s.x}, ${(s.y + d.y) / 2} ${d.x}, ${d.y} ${d.x}`;
}

function toggle(d) {
  if (d.children) {
    d._children = d.children;
    d.children = null;
  } else {
    d.children = d._children;
    d._children = null;
  }
}

// TOOLTIP
// ════════════════════════════════════════════════════════

function showTooltip(event, d) {
  const data = d.data;
  if (!data.cmd && !data.desc) return;

  const tt = document.getElementById("tooltip");
  const color = data._color || "#58a6ff";
  const iconBg = color + "20";

  let cmdBlock = "";
  if (data.cmd) {
    cmdBlock = `<div class="tt-cmd-block"><button class="copy-btn" onclick="navigator.clipboard.writeText(this.parentElement.innerText.replace('COPY','').trim())">COPY</button>${escHtml(data.cmd)}</div>`;
  }

  let linksBlock = "";
  if (data.url) {
    linksBlock = `<div class="tt-links"><a class="tt-link" href="${data.url}" target="_blank" rel="noopener">🔗 Tool / Reference ↗</a></div>`;
  }

  const isExploit = data._color === "#f85149";

  tt.innerHTML = `
    <button class="tt-close" onclick="document.getElementById('tooltip').style.display='none'">×</button>
    <div class="tt-header">
      <div class="tt-icon" style="background:${iconBg};color:${color}">${data.icon || (isExploit ? "⚡" : "🔧")}</div>
      <div class="tt-title">${data.name}</div>
      ${isExploit ? '<span class="tt-sev" style="background:#f8514920;color:#f85149">EXPLOIT</span>' : '<span class="tt-sev" style="background:#3fb95020;color:#3fb950">TOOL</span>'}
    </div>
    <div class="tt-body">
      ${data.desc ? `<div class="tt-desc">${data.desc}</div>` : ""}
      ${cmdBlock}
      ${linksBlock}
    </div>
    <div class="tt-footer">Right-click node for details · Click to expand/collapse</div>
  `;

  tt.style.display = "block";

  // Position
  let x = event.clientX + 16;
  let y = event.clientY - 20;
  if (x + 480 > window.innerWidth) x = event.clientX - 490;
  if (y + 400 > window.innerHeight) y = window.innerHeight - 410;
  if (y < 60) y = 60;
  tt.style.left = x + "px";
  tt.style.top = y + "px";
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Close tooltip on click elsewhere
document.addEventListener("click", e => {
  if (!e.target.closest("#tooltip") && !e.target.closest(".copy-btn")) {
    document.getElementById("tooltip").style.display = "none";
  }
});

// ════════════════════════════════════════════════════════
// TOOLBAR FUNCTIONS
// ════════════════════════════════════════════════════════

function expandAllRecursive(d) {
  if (d._children) { d.children = d._children; d._children = null; }
  if (d.children) d.children.forEach(expandAllRecursive);
}

function collapseAllRecursive(d) {
  if (d.children) {
    d.children.forEach(collapseAllRecursive);
    if (d.depth >= 1) { d._children = d.children; d.children = null; }
  }
}

function expandAll() {
  expandAllRecursive(root);
  update(root);
  // Zoom out to fit
  svg.transition().duration(700).call(zoom.transform, d3.zoomIdentity.translate(80, height/2).scale(0.35));
}

function collapseAll() {
  root.children.forEach(c => collapseAllRecursive(c));
  update(root);
  svg.transition().duration(700).call(zoom.transform, d3.zoomIdentity.translate(140, height/2).scale(0.85));
}

function resetZoom() {
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(140, height/2).scale(0.85));
}

function updateCount() {
  const visible = root.descendants().filter(d => !d._hidden).length;
  const total = root.descendants().length;
  document.getElementById("nodeCount").textContent = `${visible} nodes visible · ${total} total`;
}

function searchTree(query) {
  if (!query) {
    // Reset
    root.descendants().forEach(d => { d._hidden = false; });
    update(root);
    return;
  }
  query = query.toLowerCase();
  
  // Expand matching branches
  function searchAndExpand(d) {
    let found = false;
    const nameMatch = d.data.name.toLowerCase().includes(query);
    const cmdMatch = d.data.cmd && d.data.cmd.toLowerCase().includes(query);
    const descMatch = d.data.desc && d.data.desc.toLowerCase().includes(query);

    if (nameMatch || cmdMatch || descMatch) found = true;

    const children = d.children || d._children;
    if (children) {
      children.forEach(c => {
        if (searchAndExpand(c)) found = true;
      });
      if (found) {
        d.children = children;
        d._children = null;
      }
    }
    d._hidden = !found;
    return found;
  }

  searchAndExpand(root);
  update(root);
}

// ════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════

update(root);

// Keyboard shortcuts
document.addEventListener("keydown", e => {
  if (e.key === "Escape") document.getElementById("tooltip").style.display = "none";
  if (e.key === "e" && e.ctrlKey) { e.preventDefault(); expandAll(); }
  if (e.key === "/" && !e.target.matches("input")) { e.preventDefault(); document.getElementById("searchBox").focus(); }
});
</script>
